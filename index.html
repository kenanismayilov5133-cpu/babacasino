<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>BABA KAZİNO | Pro Admin System</title>
    <style>
        :root { --gold: #ffcc00; --neon: #39ff14; --red: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; touch-action: manipulation; }
        body { background: #000; color: white; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* GİRİŞ SİSTEMİ */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .keypad-container { width: 320px; background: #222; border: 4px solid #444; border-radius: 15px; padding: 20px; text-align: center; }
        .access-screen { background: #001a00; border: 2px solid #004400; height: 50px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #0f0; letter-spacing: 5px; border-radius: 5px; }
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key-btn { background: #333; border: 1px solid #555; border-radius: 8px; height: 60px; color: white; font-size: 22px; font-weight: bold; cursor: pointer; }

        /* ADMİN PANEL */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 1000; overflow-y: auto; padding: 20px; }
        .admin-box { max-width: 600px; margin: 0 auto; background: #151515; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: var(--gold); }
        
        .add-user-section { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 25px; border: 1px dashed var(--neon); }
        .admin-input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; margin: 5px; width: calc(33% - 15px); }
        .admin-btn { padding: 10px 15px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; }
        .btn-create { background: var(--neon); color: #000; width: 100%; margin-top: 10px; }
        .btn-save { background: #1b5e20; color: white; }
        .btn-delete { background: var(--red); color: white; }
        
        .user-item { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; border-left: 4px solid var(--gold); }
        .user-info { display: flex; justify-content: space-between; align-items: center; }

        /* OYUN SAHƏSİ */
        #game-container { display: none; width: 100%; max-width: 950px; background: #111; padding: 15px; border: 3px solid #333; border-radius: 15px; position: relative; }
        .reels-wrapper { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 20px; padding: 10px; background: #000; border-radius: 10px; position: relative; }
        .reel-col { width: 19%; height: 380px; background: #0a0a0a; border: 1px solid #333; border-radius: 5px; overflow: hidden; }
        .symbol { width: 100%; height: 126px; display: flex; align-items: center; justify-content: center; }
        .symbol img { width: 95px; height: 95px; object-fit: contain; }
        .win-line-overlay { position: absolute; height: 8px; background: #fbff00; box-shadow: 0 0 15px #fbff00; z-index: 100; border-radius: 4px; pointer-events: none; display: none; }
        .dash { display: flex; justify-content: space-around; background: #222; border: 2px solid #444; padding: 10px; margin-bottom: 15px; border-radius: 10px; }
        .info-item { text-align: center; }
        .info-item span { display: block; font-size: 11px; color: #888; text-transform: uppercase; }
        .info-item strong { display: block; font-size: 18px; color: var(--gold); }
        .control-panel { display: flex; justify-content: space-between; align-items: center; gap: 5px; }
        .btn-rect { background: #333; border: 2px solid #555; color: white; padding: 8px 5px; border-radius: 8px; cursor: pointer; font-weight: bold; min-width: 70px; text-align: center; font-size: 12px; }
        .main-btn { width: 110px; height: 110px; border-radius: 50%; border: 10px solid #1b5e20; background: #fff; color: #000; font-size: 18px; font-weight: 900; cursor: pointer; }
        .main-btn.stop { border-color: #b71c1c; background: #ff5252; color: #fff; }
        .main-btn.take { border-color: #fbc02d; background: #ffeb3b; color: #000; animation: flash 0.8s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .win-glow { filter: brightness(1.3) drop-shadow(0 0 15px #fbff00); transform: scale(1.1); }
        .star-glow { filter: brightness(1.5) drop-shadow(0 0 25px #ffcc00); animation: starPulse 0.5s infinite alternate; }
        @keyframes starPulse { from { transform: scale(1.1); } to { transform: scale(1.2); } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="keypad-container">
            <div class="access-screen" id="code-display">****</div>
            <div class="keypad-grid" id="keys"></div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-box">
            <div class="admin-header">
                <h2>BABA PANEL VIP</h2>
                <button class="admin-btn btn-delete" onclick="location.reload()">BAĞLA</button>
            </div>
            <div class="add-user-section">
                <h4 style="margin-bottom:10px; color:var(--neon)">YENİ İSTİFADƏÇİ</h4>
                <input type="text" id="new-code" class="admin-input" placeholder="KOD">
                <input type="number" id="new-bal" class="admin-input" placeholder="BALANS">
                <input type="number" id="new-perc" class="admin-input" placeholder="UDUŞ %">
                <button class="admin-btn btn-create" onclick="createUser()">SİSTEMƏ ƏLAVƏ ET</button>
            </div>
            <div id="user-list">Yüklənir...</div>
        </div>
    </div>

    <div id="game-container">
        <div class="reels-wrapper" id="reels-area">
            <div id="line-0" class="win-line-overlay"></div>
            <div id="line-1" class="win-line-overlay"></div>
            <div id="line-2" class="win-line-overlay"></div>
            <div class="reel-col" id="r1"></div><div class="reel-col" id="r2"></div><div class="reel-col" id="r3"></div><div class="reel-col" id="r4"></div><div class="reel-col" id="r5"></div>
        </div>
        <div class="dash">
            <div class="info-item"><span>BALANS</span><strong id="bal-val">0.00</strong></div>
            <div class="info-item"><span>UDUŞ</span><strong id="win-val" style="color:var(--neon)">0.00</strong></div>
            <div class="info-item"><span>CƏMİ MƏRC</span><strong id="bet-total">0.20</strong></div>
        </div>
        <div class="control-panel">
            <button class="btn-rect">RİSK</button>
            <button class="btn-rect" onclick="toggleAuto()" id="auto-btn">AVTO</button>
            <button class="main-btn" id="main-btn" onclick="handleAction()">START</button>
            <button class="btn-rect" onclick="changeLines()">XƏTT<br><b id="line-val">20</b></button>
            <button class="btn-rect" onclick="changeBet()">MƏRC<br><b id="bet-val">0.01</b></button>
        </div>
    </div>

    <script>
        const DB_URL = "https://babacasino-9fca0-default-rtdb.firebaseio.com/users";
        let currentUser = null, balans = 0, winPerc = 25, inputCode = "", gameState = "START", autoMode = false;
        let activeLine = 20, betIndex = 0, currentWin = 0, spinCount = 0;
        const betList = [0.01, 0.10, 0.30, 0.50, 0.70, 1.00, 2.00, 5.00, 10.00, 20.00, 50.00, 100.00, 200.00];
        const items = ["7.png.jpeg", "gavali.png.jpeg", "limon.png.jpeg", "portagal.png.jpeg", "qarpiz.png.jpeg", "ulduz.png.jpeg", "uzum.png.jpeg"];
        const baseUrl = "https://raw.githubusercontent.com/kenanismayilov5133-cpu/babacasino/main/simvollar/";
        let intervals = [null, null, null, null, null], stopTimeouts = [];

        // KOD SİSTEMİ
        const keyArea = document.getElementById('keys');
        [1,2,3,4,5,6,7,8,9,'C',0,'OK'].forEach(k => {
            let b = document.createElement('button'); b.className = 'key-btn'; b.innerText = k;
            b.onclick = () => {
                if(k === 'C') inputCode = "";
                else if(k === 'OK') checkLogin();
                else if(inputCode.length < 4) inputCode += k;
                document.getElementById('code-display').innerText = "*".repeat(inputCode.length) || "****";
            };
            keyArea.appendChild(b);
        });

        async function checkLogin() {
            if(inputCode === "0071") { openAdmin(); return; }
            try {
                let res = await fetch(`${DB_URL}/${inputCode}.json`);
                let data = await res.json();
                if(data) {
                    currentUser = inputCode; balans = data.bal; winPerc = data.perc || 25;
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('game-container').style.display = 'block';
                    updateUI(); fillReels();
                } else { alert("KOD SƏHVDİR!"); inputCode = ""; }
            } catch(e) { alert("Xəta!"); }
        }

        // ADMİN
        function openAdmin() { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('admin-panel').style.display = 'block'; loadUsers(); }
        async function loadUsers() {
            let res = await fetch(`${DB_URL}.json`); let users = await res.json(); let html = "";
            for(let id in users) {
                html += `<div class="user-item"><div class="user-info"><strong>KOD: ${id}</strong><button class="admin-btn btn-delete" onclick="deleteUser('${id}')">SİL</button></div>
                <div style="display:flex; gap:5px;"><input id="b-${id}" class="admin-input" type="number" value="${users[id].bal}" style="width:40%"><input id="p-${id}" class="admin-input" type="number" value="${users[id].perc || 25}" style="width:30%">
                <button class="admin-btn btn-save" onclick="saveUserData('${id}')">OK</button></div></div>`;
            }
            document.getElementById('user-list').innerHTML = html;
        }
        async function createUser() {
            let c = document.getElementById('new-code').value, b = parseFloat(document.getElementById('new-bal').value), p = parseInt(document.getElementById('new-perc').value);
            await fetch(`${DB_URL}/${c}.json`, { method: 'PUT', body: JSON.stringify({ bal: b, perc: p }) }); loadUsers();
        }
        async function saveUserData(id) {
            let nb = parseFloat(document.getElementById(`b-${id}`).value), np = parseInt(document.getElementById(`p-${id}`).value);
            await fetch(`${DB_URL}/${id}.json`, { method: 'PATCH', body: JSON.stringify({ bal: nb, perc: np }) }); alert("Yeniləndi!");
        }
        async function deleteUser(id) { if(confirm("Silinsin?")) { await fetch(`${DB_URL}/${id}.json`, { method: 'DELETE' }); loadUsers(); } }

        // OYUN
        function changeLines() { activeLine = activeLine >= 20 ? 1 : activeLine + 1; document.getElementById('line-val').innerText = activeLine; updateUI(); }
        function changeBet() { betIndex = (betIndex + 1) % betList.length; document.getElementById('bet-val').innerText = betList[betIndex].toFixed(2); updateUI(); }
        function updateUI(w=0) {
            document.getElementById('bal-val').innerText = balans.toFixed(2);
            document.getElementById('win-val').innerText = w.toFixed(2);
            document.getElementById('bet-total').innerText = (activeLine * betList[betIndex]).toFixed(2);
            if(currentUser) fetch(`${DB_URL}/${currentUser}/bal.json`, { method: 'PUT', body: balans });
        }
        function fillReels(specificReel = null) {
            const start = specificReel ? specificReel : 1; const end = specificReel ? specificReel : 5;
            for(let i=start; i<=end; i++) {
                let r = document.getElementById('r'+i); r.innerHTML = "";
                for(let j=0; j<3; j++) {
                    let img = items[Math.floor(Math.random()*items.length)];
                    if(Math.random()*100 < winPerc/5) img = "7.png.jpeg";
                    r.innerHTML += `<div class="symbol" id="s-${i-1}-${j}" data-sym="${img}"><img src="${baseUrl+img}"></div>`;
                }
            }
        }

        function handleAction() {
            let totalBet = activeLine * betList[betIndex];
            if(gameState === "START") {
                if(balans < totalBet) return alert("Balans azdır!");
                balans -= totalBet; updateUI(); clearWinEffects(); spinCount++; gameState = "SPIN";
                document.getElementById('main-btn').innerText = "STOP"; document.getElementById('main-btn').classList.add('stop');
                for(let i=1; i<=5; i++) intervals[i-1] = setInterval(() => fillReels(i), 70);
                for(let i=1; i<=5; i++) stopTimeouts.push(setTimeout(() => { clearInterval(intervals[i-1]); if(i===5) checkPayout(); }, 600+(i*400)));
            } else if(gameState === "SPIN") {
                stopTimeouts.forEach(clearTimeout); intervals.forEach(clearInterval);
                for(let i=1; i<=5; i++) fillReels(i); checkPayout();
            } else if(gameState === "TAKE") {
                balans += currentWin; currentWin = 0; updateUI(); gameState = "START";
                document.getElementById('main-btn').innerText = "START"; document.getElementById('main-btn').classList.remove('take');
                clearWinEffects(); if(autoMode) setTimeout(handleAction, 500);
            }
        }

        function checkPayout() {
            let totalWin = 0; let winDetails = []; let totalBet = activeLine * betList[betIndex];
            
            // --- 3 ULDUZ MƏNTİQİ (Hər hansı yerdə 3 ulduz gəlsə mərcin 2 qatı) ---
            let starCount = 0;
            document.querySelectorAll('.symbol').forEach(s => { if(s.dataset.sym === "ulduz.png.jpeg") starCount++; });
            
            if(starCount >= 3) {
                totalWin += totalBet * 2; 
                document.querySelectorAll('.symbol').forEach(s => { 
                    if(s.dataset.sym === "ulduz.png.jpeg") s.querySelector('img').classList.add('star-glow'); 
                });
            }

            // Normal xətt uduşları
            for (let row = 0; row < 3; row++) {
                let first = document.getElementById(`s-0-${row}`).dataset.sym; let matches = 1;
                for (let col = 1; col < 5; col++) {
                    if (document.getElementById(`s-${col}-${row}`).dataset.sym === first) matches++; else break;
                }
                if (matches >= 3) {
                    let mult = (first === "7.png.jpeg") ? (matches === 3 ? 50 : (matches === 4 ? 100 : 200)) : (matches === 3 ? 3 : (matches === 4 ? 10 : 50));
                    totalWin += betList[betIndex] * mult; winDetails.push({row, matches});
                }
            }

            if (totalWin > 0) {
                currentWin = totalWin; updateUI(currentWin); gameState = "TAKE";
                let b = document.getElementById('main-btn'); b.innerText = "TAKE"; b.classList.remove('stop'); b.classList.add('take');
                applyVisuals(winDetails);
            } else {
                gameState = "START"; document.getElementById('main-btn').innerText = "START";
                document.getElementById('main-btn').classList.remove('stop'); if(autoMode) setTimeout(handleAction, 800);
            }
        }

        function applyVisuals(details) {
            details.forEach(w => {
                let l = document.getElementById(`line-${w.row}`); l.style.display = 'block'; l.style.top = (63+(w.row*126))+'px'; l.style.width = (w.matches*19)+'%';
                for(let c=0; c<w.matches; c++) document.querySelector(`#s-${c}-${w.row} img`).classList.add('win-glow');
            });
        }
        function clearWinEffects() { document.querySelectorAll('.win-line-overlay').forEach(l => l.style.display='none'); document.querySelectorAll('.symbol img').forEach(i => i.classList.remove('win-glow', 'star-glow')); }
        function toggleAuto() { autoMode = !autoMode; document.getElementById('auto-btn').style.background = autoMode ? 'var(--neon)' : '#333'; if(autoMode && gameState === "START") handleAction(); }
    </script>
</body>
</html>
