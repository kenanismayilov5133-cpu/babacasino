<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABA KAZİNO</title>
    <style>
        :root { --gold: #ffd700; --dark: #111; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Giriş Ekranı */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .keypad-container { background: #222; padding: 20px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; }
        .access-screen { background: #000; color: var(--gold); font-size: 30px; height: 50px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border-radius: 5px; border: 1px solid #444; letter-spacing: 5px; min-width: 200px; }
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key-btn { background: #333; color: white; border: none; padding: 20px; font-size: 20px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .key-btn:active { background: var(--gold); color: black; }

        /* Oyun Sahəsi */
        #game-container { display: none; width: 100%; max-width: 500px; text-align: center; }
        .stats { display: flex; justify-content: space-around; background: #222; padding: 10px; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 10px; }
        .stat-box span { display: block; font-size: 12px; color: #888; }
        .stat-box b { font-size: 18px; color: var(--gold); }

        .slot-machine { background: #222; padding: 15px; border-radius: 15px; border: 4px solid var(--gold); position: relative; overflow: hidden; }
        .reels { display: flex; gap: 5px; justify-content: center; }
        .reel { width: 80px; height: 240px; background: #000; border: 1px solid #333; border-radius: 5px; overflow: hidden; position: relative; }
        .symbol { height: 80px; display: flex; justify-content: center; align-items: center; }
        .symbol img { width: 60px; height: 60px; object-fit: contain; }

        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .main-btn { background: linear-gradient(180deg, #ff0, #d4af37); color: black; border: none; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .bet-controls { display: flex; justify-content: center; gap: 10px; }
        .bet-btn { background: #333; color: white; border: 1px solid var(--gold); padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 style="color: var(--gold);">GİRİŞ</h2>
        <div class="keypad-container">
            <div id="code-display" class="access-screen"></div>
            <div class="keypad-grid">
                <button class="key-btn" onclick="pressKey('1')">1</button>
                <button class="key-btn" onclick="pressKey('2')">2</button>
                <button class="key-btn" onclick="pressKey('3')">3</button>
                <button class="key-btn" onclick="pressKey('4')">4</button>
                <button class="key-btn" onclick="pressKey('5')">5</button>
                <button class="key-btn" onclick="pressKey('6')">6</button>
                <button class="key-btn" onclick="pressKey('7')">7</button>
                <button class="key-btn" onclick="pressKey('8')">8</button>
                <button class="key-btn" onclick="pressKey('9')">9</button>
                <button class="key-btn" style="background:#800" onclick="resetKeypad()">C</button>
                <button class="key-btn" onclick="pressKey('0')">0</button>
                <button class="key-btn" style="background:#080" onclick="checkCode()">OK</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div class="stats">
            <div class="stat-box"><span>BALANS</span><b id="bal-val">0.00 AZN</b></div>
            <div class="stat-box"><span>UDUŞ</span><b id="win-val">0.00 AZN</b></div>
            <div class="stat-box"><span>MƏRC</span><b id="bet-total-val">1.00 AZN</b></div>
        </div>

        <div class="slot-machine">
            <div class="reels" id="reels-container">
                <div class="reel" id="r1"></div>
                <div class="reel" id="r2"></div>
                <div class="reel" id="r3"></div>
                <div class="reel" id="r4"></div>
                <div class="reel" id="r5"></div>
            </div>
        </div>

        <div class="controls">
            <div class="bet-controls">
                <button class="bet-btn" onclick="changeBet(-0.1)">-</button>
                <span>MƏRC: <b id="bet-display">1.00</b></span>
                <button class="bet-btn" onclick="changeBet(0.1)">+</button>
            </div>
            <button class="main-btn" id="spin-btn" onclick="handleMainAction()">SPIN</button>
        </div>
    </div>

    <script>
        // İSTİFADƏÇİ DATA
        const users = {
            "17654726": { bal: 50.00, winPercent: 30 },
            "65472398": { bal: 10.00, winPercent: 15 },
            "96437287": { bal: 15.00, winPercent: 20 },
            "15873776": { bal: 25.00, winPercent: 25 },
            "66874435": { bal: 35.00, winPercent: 10 },
            "75578677": { bal: 45.00, winPercent: 45 }
        };

        let balans = 0, activeBet = 1.00, inputCode = "", gameState = "START";
        const baseUrl = "https://raw.githubusercontent.com/kenanismayilov5133-cpu/babacasino/main/simvollar/";
        const items = ["7.png.jpeg", "gavali.png.jpeg", "limon.png.jpeg", "portagal.png.jpeg", "qarpiz.png.jpeg", "ulduz.png.jpeg", "uzum.png.jpeg"];

        // GİRİŞ MƏNTİQİ
        function pressKey(num) {
            if(inputCode.length < 8) {
                inputCode += num;
                document.getElementById('code-display').innerText = "*".repeat(inputCode.length);
            }
        }

        function resetKeypad() {
            inputCode = "";
            document.getElementById('code-display').innerText = "";
        }

        function checkCode() {
            if(users[inputCode]) {
                // Yaddaşdan balansı yoxla
                let savedBal = localStorage.getItem('bal_' + inputCode);
                balans = (savedBal !== null) ? parseFloat(savedBal) : users[inputCode].bal;
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                updateUI();
                fillInitialReels();
            } else {
                alert("KOD SƏHVDİR!");
                resetKeypad();
            }
        }

        function updateUI(win = 0) {
            document.getElementById('bal-val').innerText = balans.toFixed(2) + " AZN";
            document.getElementById('win-val').innerText = win.toFixed(2) + " AZN";
            document.getElementById('bet-display').innerText = activeBet.toFixed(2);
            document.getElementById('bet-total-val').innerText = activeBet.toFixed(2) + " AZN";
            
            // Balansı yaddaşa yaz
            if(inputCode) {
                localStorage.setItem('bal_' + inputCode, balans);
            }
        }

        function changeBet(val) {
            if(gameState !== "START") return;
            activeBet = Math.max(0.1, activeBet + val);
            updateUI();
        }

        // OYUN MƏNTİQİ (SADƏLƏŞDİRİLMİŞ)
        function fillInitialReels() {
            for(let i=1; i<=5; i++) {
                let r = document.getElementById('r'+i);
                r.innerHTML = '';
                for(let j=0; j<3; j++) {
                    let img = items[Math.floor(Math.random() * items.length)];
                    r.innerHTML += `<div class="symbol"><img src="${baseUrl}${img}"></div>`;
                }
            }
        }

        function handleMainAction() {
            if(gameState === "START") {
                if(balans < activeBet) { alert("BALANS YOXDUR!"); return; }
                balans -= activeBet;
                updateUI();
                startSpin();
            }
        }

        function startSpin() {
            gameState = "SPINNING";
            let counts = 0;
            let interval = setInterval(() => {
                fillInitialReels();
                counts++;
                if(counts > 20) {
                    clearInterval(interval);
                    gameState = "START";
                    checkWin();
                }
            }, 50);
        }

        function checkWin() {
            // Şans məntiqi (winPercent)
            let chance = Math.random() * 100;
            if(chance < users[inputCode].winPercent) {
                let winAmt = activeBet * 5;
                balans += winAmt;
                updateUI(winAmt);
            } else {
                updateUI(0);
            }
        }
    </script>
</body>
</html>
