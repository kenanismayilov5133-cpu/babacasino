<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BABA KAZİNO | Premium Edition</title>
    <script>
        // --- MÜŞTƏRİ SİYAHISI ---
        const MUSTERILER = {
            "145127": 10.00,
            "223344": 50.00,
            "998877": 30.00,
            "554433": 15.00,
            "756737": 20.00,
            "996476": 25.00,
            "777": 1000.00
        };
    </script>
    <style>
        :root { 
            --gold: #ffcc00; 
            --dark-gold: #b8860b;
            --neon-green: #39ff14;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body { 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            color: white; 
            overflow: hidden; 
            height: 100vh; 
        }

        /* Giriş Ekranı */
        #login-screen { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(135deg, #000, #1a1a1a); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
        }

        .code-screen { 
            width: 280px; 
            height: 60px; 
            background: #000; 
            border: 2px solid var(--gold); 
            border-radius: 12px; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 28px; 
            letter-spacing: 5px;
            color: var(--gold); 
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3); 
        }

        .numpad { display: grid; grid-template-columns: repeat(3, 75px); gap: 15px; }
        
        .num-btn { 
            width: 75px; 
            height: 75px; 
            background: var(--glass); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 50%; 
            color: white; 
            font-size: 22px; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .num-btn:active { transform: scale(0.9); background: var(--gold); color: #000; }

        /* Oyun Sahəsi */
        #game-area { display: none; flex-direction: column; height: 100vh; }

        .reels-container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px; 
            padding: 15px; 
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            position: relative; 
        }

        .reel-col { 
            width: 18%; 
            height: 320px; 
            background: linear-gradient(180deg, #111 0%, #222 50%, #111 100%); 
            border: 1px solid #444; 
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around; 
            align-items: center; 
            overflow: hidden; 
            box-shadow: inset 0 0 20px #000;
        }

        .symbol { 
            width: 80%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .symbol img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        /* Dash & Panel */
        .dash { 
            background: #0a0a0a; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            padding: 20px; 
            border-top: 3px solid var(--dark-gold); 
            gap: 10px;
        }

        .info-box {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .info-box span { display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; }
        .info-box strong { font-size: 20px; color: var(--gold); text-shadow: 0 0 10px rgba(255, 204, 0, 0.5); }

        .controls { 
            background: #000; 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .btn-main { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            border: none; 
            background: radial-gradient(#444, #111); 
            color: white; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1), inset 0 0 10px #000;
            border: 2px solid #555;
        }

        .btn-main.start { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
        .btn-main.stop { border-color: #ff3e3e; color: #ff3e3e; box-shadow: 0 0 15px #ff3e3e; }
        .btn-main.take { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 15px var(--gold); }

        .btn-auto { 
            padding: 10px 20px; 
            border-radius: 20px; 
            background: #1a1a1a; 
            color: #888; 
            border: 1px solid #333; 
            font-size: 12px;
        }

        .exit-btn {
            background: #400;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
        }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="login-screen">
        <h1 style="color:var(--gold); margin-bottom:30px; letter-spacing:3px;">BABA KAZİNO</h1>
        <div class="code-screen" id="display">****</div>
        <div class="numpad" id="pad"></div>
    </div>

    <div id="game-area">
        <div class="reels-container" id="main-stage">
            <div class="reel-col" id="r1"></div>
            <div class="reel-col" id="r2"></div>
            <div class="reel-col" id="r3"></div>
            <div class="reel-col" id="r4"></div>
            <div class="reel-col" id="r5"></div>
        </div>

        <div class="dash">
            <div class="info-box"><span>BALANS</span><strong id="bal-text">0.00</strong></div>
            <div class="info-box"><span>UDUŞ</span><strong id="win-text">0.00</strong></div>
            <div class="info-box"><span>MƏRC</span><strong id="bet-text">1.00</strong></div>
        </div>

        <div class="controls">
            <button id="auto-btn" class="btn-auto" onclick="toggleAuto()">AUTO: OFF</button>
            <button id="main-btn" class="btn-main start" onclick="handleAction()">START</button>
            <button class="exit-btn" onclick="tamCixis()">ÇIXIŞ</button>
        </div>
    </div>

    <script>
        // Şəkil linkləri (Slot simvölları)
        const symbolImages = [
            "https://img.icons8.com/emoji/96/apple-emoji.png",
            "https://img.icons8.com/emoji/96/lemon-emoji.png",
            "https://img.icons8.com/emoji/96/cherries-emoji.png",
            "https://img.icons8.com/emoji/96/grapes-emoji.png",
            "https://img.icons8.com/color/96/7-ball.png",
            "https://img.icons8.com/emoji/96/watermelon-emoji.png",
            "https://img.icons8.com/color/96/star--v1.png"
        ];

        const s_spin = new Audio('https://freesound.org/data/previews/120/120373_824230-lq.mp3');
        const s_stop = new Audio('https://actions.google.com/sounds/v1/foley/button_click.ogg');
        const s_win = new Audio('https://freesound.org/data/previews/387/387232_1474204-lq.mp3');
        const s_take = new Audio('https://actions.google.com/sounds/v1/cartoon/clink_clank.ogg');

        let balance = 0;
        let bet = 1.00;
        let pendingWin = 0;
        let state = "IDLE";
        let activeUserCode = localStorage.getItem("active_baba_user") || ""; 
        let autoMode = false;
        let timers = [];

        if(activeUserCode && MUSTERILER[activeUserCode] !== undefined) {
            window.onload = () => {
                let saved = localStorage.getItem("baba_bal_" + activeUserCode);
                balance = saved ? parseFloat(saved) : MUSTERILER[activeUserCode];
                document.getElementById('login-screen').style.display='none'; 
                document.getElementById('game-area').style.display='flex'; 
                init();
            };
        }

        const padItems = ['1','2','3','4','5','6','7','8','9','C','0','OK'];
        padItems.forEach(v => {
            const b = document.createElement('button'); b.className = 'num-btn'; b.innerText = v;
            b.onclick = () => { 
                let d = document.getElementById('display');
                if(v==='C') d.innerText='****'; 
                else if(v==='OK') login(); 
                else { if(d.innerText=='****') d.innerText=v; else d.innerText+=v; } 
            };
            document.getElementById('pad').appendChild(b);
        });

        function login() { 
            let entered = document.getElementById('display').innerText;
            if(MUSTERILER[entered] !== undefined) {
                activeUserCode = entered;
                localStorage.setItem("active_baba_user", entered);
                let saved = localStorage.getItem("baba_bal_" + entered);
                balance = saved ? parseFloat(saved) : MUSTERILER[entered];
                document.getElementById('login-screen').style.display='none'; 
                document.getElementById('game-area').style.display='flex'; 
                init(); 
            } else {
                alert("Kod yanlışdır!");
                document.getElementById('display').innerText = "****";
            }
        }

        function tamCixis() {
            if(confirm("Hesabdan çıxmaq istəyirsiniz?")) {
                localStorage.removeItem("active_baba_user");
                location.reload();
            }
        }

        function unlockAudio() { [s_spin, s_stop, s_win, s_take].forEach(s => { s.play(); s.pause(); }); }
        
        function init() { 
            updateUI(); 
            for(let i=1;i<=5;i++) fill(i); 
        }

        function fill(id) { 
            let r=document.getElementById('r'+id); 
            let content = "";
            for(let j=0; j<3; j++) {
                let imgIdx = Math.floor(Math.random()*symbolImages.length);
                content += `<div class="symbol"><img src="${symbolImages[imgIdx]}"></div>`;
            }
            r.innerHTML = content;
        }

        function handleAction() {
            if(state === "IDLE") {
                if(balance < bet) { alert("Balans bitib!"); return; }
                startSpin();
            } else if(state === "SPINNING") forceStop();
            else if(state === "WINNING") takeMoney();
        }

        function startSpin() {
            state = "SPINNING";
            balance -= bet;
            save();
            updateUI();
            s_spin.loop = true; s_spin.play();
            document.getElementById('main-btn').innerText = "STOP";
            document.getElementById('main-btn').className = "btn-main stop";
            for(let i=1; i<=5; i++) {
                timers[i] = setInterval(() => fill(i), 70);
                timers[i+5] = setTimeout(() => stopReel(i), 800 + (i*300));
            }
        }

        function stopReel(id) {
            if(state !== "SPINNING") return;
            clearInterval(timers[id]);
            s_stop.play();
            if(id === 5) { s_spin.pause(); checkWin(); }
        }

        function forceStop() {
            for(let i=1; i<=10; i++) { clearInterval(timers[i]); clearTimeout(timers[i]); }
            for(let i=1; i<=5; i++) fill(i);
            s_spin.pause(); s_stop.play();
            checkWin();
        }

        function checkWin() {
            state = "IDLE";
            if(Math.random() * 100 < 30) {
                state = "WINNING";
                pendingWin = bet * (Math.floor(Math.random()*8)+2);
                document.getElementById('main-btn').innerText = "TAKE";
                document.getElementById('main-btn').className = "btn-main take";
                s_win.play();
            } else {
                document.getElementById('main-btn').innerText = "START";
                document.getElementById('main-btn').className = "btn-main start";
            }
            updateUI();
        }

        function takeMoney() {
            balance += pendingWin;
            save();
            pendingWin = 0;
            state = "IDLE";
            s_take.play();
            document.getElementById('main-btn').innerText = "START";
            document.getElementById('main-btn').className = "btn-main start";
            updateUI();
            if(autoMode) setTimeout(handleAction, 1000);
        }

        function save() { if(activeUserCode) localStorage.setItem("baba_bal_" + activeUserCode, balance); }
        
        function updateUI() { 
            document.getElementById('bal-text').innerText = balance.toFixed(2); 
            document.getElementById('win-text').innerText = pendingWin.toFixed(2);
            document.getElementById('bet-text').innerText = bet.toFixed(2);
        }

        function toggleAuto() {
            autoMode = !autoMode;
            document.getElementById('auto-btn').innerText = autoMode ? "AUTO: ON" : "AUTO: OFF";
            document.getElementById('auto-btn').style.color = autoMode ? "var(--neon-green)" : "#888";
            if(autoMode && state === "IDLE") handleAction();
        }
    </script>
</body>
</html>
