<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABA KAZİNO | Admin</title>
    <style>
        :root { --gold: #ffd700; --dark: #111; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Giriş Paneli */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .keypad-container { background: #222; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .access-screen { background: #000; color: var(--gold); font-size: 35px; height: 65px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border-radius: 10px; border: 1px solid #444; letter-spacing: 5px; min-width: 250px; font-weight: bold; }
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key-btn { background: #333; color: white; border: none; padding: 22px; font-size: 24px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .key-btn:active { background: var(--gold); color: black; transform: scale(0.95); }

        /* Oyun Sahəsi (Orijinal Dizayn) */
        #game-container { display: none; width: 100%; max-width: 600px; text-align: center; }
        .stats { display: flex; justify-content: space-around; background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 15px; }
        .stat-box span { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; }
        .stat-box b { font-size: 20px; color: var(--gold); }

        .slot-machine { background: #222; padding: 20px; border-radius: 20px; border: 5px solid var(--gold); position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .reels { display: flex; gap: 8px; justify-content: center; background: #000; padding: 10px; border-radius: 10px; }
        .reel { width: 90px; height: 270px; background: #111; border: 1px solid #222; border-radius: 8px; overflow: hidden; position: relative; }
        .symbol { height: 90px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .symbol img { width: 70px; height: 70px; object-fit: contain; }

        .controls { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }
        .main-btn { background: linear-gradient(180deg, #fff300, #ffaa00); color: black; border: none; padding: 20px; font-size: 26px; font-weight: 900; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 0 #8a6d00; text-transform: uppercase; }
        .main-btn:active { transform: translateY(3px); box-shadow: none; }
        
        .bet-area { display: flex; justify-content: center; align-items: center; gap: 20px; background: #1a1a1a; padding: 10px; border-radius: 50px; border: 1px solid #333; }
        .bet-nav { background: #333; color: var(--gold); border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 style="color:var(--gold); margin-bottom: 20px; letter-spacing: 2px;">BABA KAZİNO GİRİŞ</h2>
        <div class="keypad-container">
            <div id="code-display" class="access-screen"></div>
            <div class="keypad-grid">
                <button class="key-btn" onclick="pressKey('1')">1</button>
                <button class="key-btn" onclick="pressKey('2')">2</button>
                <button class="key-btn" onclick="pressKey('3')">3</button>
                <button class="key-btn" onclick="pressKey('4')">4</button>
                <button class="key-btn" onclick="pressKey('5')">5</button>
                <button class="key-btn" onclick="pressKey('6')">6</button>
                <button class="key-btn" onclick="pressKey('7')">7</button>
                <button class="key-btn" onclick="pressKey('8')">8</button>
                <button class="key-btn" onclick="pressKey('9')">9</button>
                <button class="key-btn" style="background:#600" onclick="resetKeypad()">C</button>
                <button class="key-btn" onclick="pressKey('0')">0</button>
                <button class="key-btn" style="background:#060" onclick="checkCode()">OK</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div class="stats">
            <div class="stat-box"><span>BALANS</span><b id="bal-val">0.00 AZN</b></div>
            <div class="stat-box"><span>SON UDUŞ</span><b id="win-val">0.00 AZN</b></div>
            <div class="stat-box"><span>XƏTT</span><b id="line-display">20</b></div>
        </div>

        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="r1"></div>
                <div class="reel" id="r2"></div>
                <div class="reel" id="r3"></div>
                <div class="reel" id="r4"></div>
                <div class="reel" id="r5"></div>
            </div>
        </div>

        <div class="controls">
            <div class="bet-area">
                <button class="bet-nav" onclick="changeBet(-1)">-</button>
                <div style="font-weight: bold;">MƏRC: <span id="bet-display" style="color:var(--gold)">1.00</span></div>
                <button class="bet-nav" onclick="changeBet(1)">+</button>
            </div>
            <button class="main-btn" onclick="handleAction()">SPIN</button>
        </div>
    </div>

    <script>
        // DATA VƏ PARAMETRLƏR
        const users = {
            "17654726": { bal: 50.00, winPercent: 30 },
            "65472398": { bal: 10.00, winPercent: 15 },
            "96437287": { bal: 15.00, winPercent: 20 },
            "15873776": { bal: 25.00, winPercent: 25 },
            "66874435": { bal: 35.00, winPercent: 10 },
            "75578677": { bal: 45.00, winPercent: 45 }
        };

        let balans = 0, activeBetIndex = 5, inputCode = "", gameState = "IDLE";
        const betSteps = [0.10, 0.20, 0.30, 0.40, 0.50, 1.00, 2.00, 5.00, 10.00, 30.00, 50.00, 100.00, 200.00];
        const baseUrl = "https://raw.githubusercontent.com/kenanismayilov5133-cpu/babacasino/main/simvollar/";
        const items = ["7.png.jpeg", "gavali.png.jpeg", "limon.png.jpeg", "portagal.png.jpeg", "qarpiz.png.jpeg", "ulduz.png.jpeg", "uzum.png.jpeg"];

        // GİRİŞ MƏNTİQİ
        function pressKey(num) {
            if(inputCode.length < 8) {
                inputCode += num;
                document.getElementById('code-display').innerText = "*".repeat(inputCode.length);
            }
        }

        function resetKeypad() {
            inputCode = "";
            document.getElementById('code-display').innerText = "";
        }

        function checkCode() {
            if(users[inputCode]) {
                let savedBal = localStorage.getItem('bal_' + inputCode);
                balans = (savedBal !== null) ? parseFloat(savedBal) : users[inputCode].bal;
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                updateUI();
                fillReels();
            } else {
                alert("KOD YANLIŞDIR!");
                resetKeypad();
            }
        }

        // UI YENİLƏMƏ VƏ YADDAŞA YAZMA
        function updateUI(win = 0) {
            document.getElementById('bal-val').innerText = balans.toFixed(2) + " AZN";
            document.getElementById('win-val').innerText = win.toFixed(2) + " AZN";
            document.getElementById('bet-display').innerText = betSteps[activeBetIndex].toFixed(2);
            
            if(inputCode) {
                localStorage.setItem('bal_' + inputCode, balans);
            }
        }

        function changeBet(dir) {
            activeBetIndex = Math.max(0, Math.min(betSteps.length - 1, activeBetIndex + dir));
            updateUI();
        }

        // OYUN MƏNTİQİ
        function fillReels() {
            for(let i=1; i<=5; i++) {
                let r = document.getElementById('r'+i);
                r.innerHTML = '';
                for(let j=0; j<3; j++) {
                    let img = items[Math.floor(Math.random() * items.length)];
                    r.innerHTML += `<div class="symbol"><img src="${baseUrl}${img}"></div>`;
                }
            }
        }

        function handleAction() {
            if(gameState !== "IDLE") return;
            let bet = betSteps[activeBetIndex];
            if(balans < bet) { alert("BALANS ÇATMIR!"); return; }
            
            balans -= bet;
            updateUI();
            gameState = "SPINNING";
            
            let spinTime = 0;
            let interval = setInterval(() => {
                fillReels();
                spinTime++;
                if(spinTime > 15) {
                    clearInterval(interval);
                    finalizeSpin(bet);
                }
            }, 70);
        }

        function finalizeSpin(bet) {
            let chance = Math.random() * 100;
            let win = 0;
            if(chance < users[inputCode].winPercent) {
                win = bet * (Math.floor(Math.random() * 5) + 2);
                balans += win;
            }
            updateUI(win);
            gameState = "IDLE";
        }
    </script>
</body>
</html>
