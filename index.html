<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BABA KAZİNO | Pro Edition</title>
    <style>
        :root { --gold: #d4af37; --red: #ff0000; --neon: #00f3ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background: #000; color: white; overflow: hidden; height: 100vh; }

        /* GİRİŞ EKRANI */
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .code-screen { width: 280px; height: 50px; background: #111; border: 2px solid var(--gold); border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .numpad { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; }
        .num-btn { width: 70px; height: 70px; background: #222; border: 1px solid #444; border-radius: 10px; color: white; font-size: 24px; cursor: pointer; }

        /* OYUN SAHƏSİ */
        #game-area { display: none; flex-direction: column; height: 100vh; position: relative; }
        .reels-container { flex: 1; display: flex; justify-content: center; align-items: center; gap: 5px; padding: 10px; background: #050505; position: relative; }
        
        .reel-col { width: 19%; height: 350px; background: rgba(20,20,20,0.95); border: 2px solid #333; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-around; align-items: center; position: relative; overflow: hidden; }
        .symbol { font-size: 50px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); transition: 0.1s; z-index: 2; }

        /* UDUŞ XƏTLƏRİ (SVG) */
        #win-lines { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none; }
        .win-path { stroke: var(--gold); stroke-width: 6; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 8px gold); animation: dash 0.5s infinite; }
        @keyframes dash { 0% { opacity: 1; } 50% { opacity: 0.3; } }

        /* DASHBOARD */
        .dash { background: #111; display: grid; grid-template-columns: repeat(3, 1fr); padding: 15px; border-top: 2px solid #222; text-align: center; }
        .info-box span { display: block; font-size: 10px; color: #888; }
        .info-box strong { font-size: 18px; color: var(--gold); }

        /* KONTROL PANELİ */
        .controls { background: #000; padding: 20px; display: flex; justify-content: space-around; align-items: center; }
        .btn-main { width: 110px; height: 110px; border-radius: 50%; border: 6px solid #fff; background: radial-gradient(#2ecc71, #1b5e20); color: white; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,0,0.4); transition: 0.2s; }
        .btn-main.stop { background: radial-gradient(#e74c3c, #962d22); box-shadow: 0 0 20px rgba(255,0,0,0.4); }
        .btn-main.take { background: radial-gradient(#f1c40f, #f39c12); color: #000; animation: pulse 0.5s infinite; border-color: #000; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="login-screen">
        <h1 style="color:var(--gold); margin-bottom:20px;" onclick="openAdmin()">BABA KAZİNO</h1>
        <div class="code-screen" id="display">****</div>
        <div class="numpad" id="pad"></div>
    </div>

    <div id="game-area">
        <div class="reels-container">
            <svg id="win-lines"></svg>
            <div class="reel-col" id="r1"></div>
            <div class="reel-col" id="r2"></div>
            <div class="reel-col" id="r3"></div>
            <div class="reel-col" id="r4"></div>
            <div class="reel-col" id="r5"></div>
        </div>

        <div class="dash">
            <div class="info-box"><span>BALANS</span><strong id="bal-text">118.00</strong></div>
            <div class="info-box"><span>UDUŞ</span><strong id="win-text">0.00</strong></div>
            <div class="info-box"><span>MƏRC</span><strong id="bet-text">1.00</strong></div>
        </div>

        <div class="controls">
            <button class="num-btn" style="width:60px; height:45px; font-size:12px" onclick="adjBet(-0.2)">BET-</button>
            <button id="main-btn" class="btn-main" onclick="handleAction()">START</button>
            <button class="num-btn" style="width:60px; height:45px; font-size:12px" onclick="adjBet(0.2)">BET+</button>
        </div>
    </div>

    <script>
        const symbols = ["🍎", "🍋", "🍒", "🍇", "7️⃣", "🍉", "⭐"];
        const s_spin = new Audio('https://actions.google.com/sounds/v1/foley/sliding_door_open.ogg');
        const s_stop = new Audio('https://actions.google.com/sounds/v1/foley/button_click.ogg');
        const s_win = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        const s_take = new Audio('https://actions.google.com/sounds/v1/cartoon/clink_clank.ogg');

        let balance = 118.00;
        let bet = 1.00;
        let pendingWin = 0;
        let masterCode = "12345678901234";
        let winRate = 40; 
        let state = "IDLE"; 
        let timers = [];

        const padItems = ['1','2','3','4','5','6','7','8','9','C','0','OK'];
        padItems.forEach(v => {
            const b = document.createElement('button'); b.className = 'num-btn'; b.innerText = v;
            b.onclick = () => { if(v==='C') document.getElementById('display').innerText='****'; else if(v==='OK') login(); else { let d=document.getElementById('display'); if(d.innerText=='****') d.innerText=v; else d.innerText+=v; } };
            document.getElementById('pad').appendChild(b);
        });

        function login() { if(document.getElementById('display').innerText === masterCode) { document.getElementById('login-screen').style.display='none'; document.getElementById('game-area').style.display='flex'; init(); } }
        function unlockAudio() { [s_spin, s_stop, s_win, s_take].forEach(s => { s.play(); s.pause(); }); }
        function init() { for(let i=1;i<=5;i++) fill(i); }
        function fill(id) { let r=document.getElementById('r'+id); r.innerHTML=`<div class="symbol">${symbols[rand()]}</div><div class="symbol">${symbols[rand()]}</div><div class="symbol">${symbols[rand()]}</div>`; }
        function rand() { return Math.floor(Math.random()*symbols.length); }

        function handleAction() {
            const btn = document.getElementById('main-btn');
            if(state === "IDLE") {
                if(balance < bet) return;
                startSpin();
            } else if(state === "SPINNING") {
                forceStop();
            } else if(state === "WINNING") {
                takeMoney();
            }
        }

        function startSpin() {
            state = "SPINNING";
            balance -= bet;
            pendingWin = 0;
            updateUI();
            document.getElementById('win-lines').style.display = 'none';
            const btn = document.getElementById('main-btn');
            btn.innerText = "STOP"; btn.className = "btn-main stop";
            s_spin.play();

            for(let i=1; i<=5; i++) {
                timers[i] = setInterval(() => fill(i), 70);
                timers[i+5] = setTimeout(() => stopReel(i), 1000 + (i*400));
            }
        }

        function stopReel(id) {
            if(state !== "SPINNING") return;
            clearInterval(timers[id]);
            s_stop.play();
            if(id === 5) checkWin();
        }

        function forceStop() {
            for(let i=1; i<=10; i++) { clearInterval(timers[i]); clearTimeout(timers[i]); }
            for(let i=1; i<=5; i++) fill(i);
            s_stop.play();
            checkWin();
        }

        function checkWin() {
            state = "IDLE";
            let isWin = (Math.random() * 100) < winRate;
            const btn = document.getElementById('main-btn');

            if(isWin) {
                state = "WINNING";
                pendingWin = bet * (Math.floor(Math.random()*5)+2);
                drawWinLines();
                btn.innerText = "TAKE";
                btn.className = "btn-main take";
                s_win.play();
            } else {
                btn.innerText = "START";
                btn.className = "btn-main";
            }
            updateUI();
        }

        function drawWinLines() {
            const svg = document.getElementById('win-lines');
            svg.innerHTML = `
                <path class="win-path" d="M 0 100 L 1000 100" />
                <path class="win-path" d="M 0 200 L 1000 200" />
                <path class="win-path" d="M 0 50 L 500 350 L 1000 50" />
            `;
            svg.style.display = 'block';
        }

        function takeMoney() {
            s_take.play();
            balance += pendingWin;
            pendingWin = 0;
            state = "IDLE";
            document.getElementById('win-lines').style.display = 'none';
            const btn = document.getElementById('main-btn');
            btn.innerText = "START";
            btn.className = "btn-main";
            updateUI();
        }

        function adjBet(v) { if(state==="IDLE") { bet=Math.max(0.2, bet+v); updateUI(); } }
        function updateUI() { 
            document.getElementById('bal-text').innerText = balance.toFixed(2); 
            document.getElementById('win-text').innerText = pendingWin.toFixed(2);
            document.getElementById('bet-text').innerText = bet.toFixed(2);
        }
        function openAdmin() { let p=prompt('Pass:'); if(p=='777') winRate=prompt('Win %:', winRate); }
    </script>
</body>
</html>
