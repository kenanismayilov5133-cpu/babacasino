<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BABA KAZİNO | Ultra Edition</title>
    <style>
        :root { --gold: #ffd700; --fire: #ff4500; }
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        #game-area { display: flex; height: 100vh; flex-direction: column; background: radial-gradient(circle, #220000 0%, #000 100%); }
        
        /* Slot Sistemi */
        .reels { flex: 1; display: flex; justify-content: center; align-items: center; gap: 5px; padding: 10px; }
        .reel { width: 18%; height: 70%; background: rgba(20,20,20,0.9); border: 2px solid #333; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-around; align-items: center; overflow: hidden; box-shadow: inset 0 0 15px #000; }
        
        /* Yüklədiyin Professional Şəkillər */
        .sym-img { width: 85%; height: auto; max-height: 80px; object-fit: contain; filter: drop-shadow(0 0 5px rgba(255,215,0,0.3)); transition: 0.1s; }
        
        /* İnfo Paneli */
        .panel { background: #0a0a0a; padding: 12px; display: grid; grid-template-columns: repeat(3, 1fr); border-top: 2px solid #222; }
        .stat { text-align: center; border-right: 1px solid #222; }
        .stat:last-child { border-right: none; }
        .stat span { font-size: 11px; color: #888; display: block; font-weight: bold; text-transform: uppercase; }
        .stat b { font-size: 20px; color: var(--gold); letter-spacing: 1px; }
        .azn-label { font-size: 10px; color: #555; display: block; margin-top: 2px; }
        
        /* Düymələr */
        .controls { padding: 20px; display: flex; justify-content: space-around; align-items: center; background: #050505; }
        .btn-start { width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(#2ecc71, #1b5e20); border: 4px solid #fff; color: #fff; font-weight: bold; font-size: 16px; box-shadow: 0 0 20px rgba(46,204,113,0.4); cursor: pointer; text-transform: uppercase; }
        .btn-start:active { transform: scale(0.95); }
        .btn-avto { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); background: transparent; color: var(--gold); font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-exit { background: #550000; color: #aaa; border: 1px solid #333; padding: 8px 15px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-area">
    <div class="reels">
        <div class="reel" id="r1"></div>
        <div class="reel" id="r2"></div>
        <div class="reel" id="r3"></div>
        <div class="reel" id="r4"></div>
        <div class="reel" id="r5"></div>
    </div>

    <div class="panel">
        <div class="stat"><span>KREDİT</span><b id="bal-txt">16400</b><span class="azn-label">164.00 Azn</span></div>
        <div class="stat"><span>UDULUB</span><b id="win-txt">0</b><span class="azn-label">0.00 Azn</span></div>
        <div class="stat"><span>BAHİS</span><b id="bet-txt">200</b><span class="azn-label">2.00 Azn</span></div>
    </div>

    <div class="controls">
        <button class="btn-avto" id="avto-btn" onclick="toggleAuto()">AVTO</button>
        <button class="btn-start" id="main-btn" onclick="handlePlay()">START</button>
        <button class="btn-exit" onclick="location.reload()">ÇIXIŞ</button>
    </div>
</div>

<script>
    // GitHub-a yüklədiyin şəkillərin tam adları
    const symbolImages = [
    "simvollar/7.png.jpeg",
    "simvollar/gavali.png.jpeg",
    "simvollar/limon.png.jpeg",
    "simvollar/portagal.png.jpeg",
    "simvollar/qarpiz.png.jpeg",
    "simvollar/ulduz.png.jpeg",
    "simvollar/uzum.png.jpeg"
];

    

    
    let curBal = 164.00;
    let curWin = 0;
    let curBet = 2.00;
    let isSpinning = false;
    let auto = false;

    // Başlanğıcda slotları doldur
    function init() {
        for(let i=1; i<=5; i++) {
            const r = document.getElementById('r'+i);
            r.innerHTML = '';
            for(let j=0; j<3; j++) {
                const img = document.createElement('img');
                img.className = 'sym-img';
                img.src = symbolImages[Math.floor(Math.random() * symbolImages.length)];
                r.appendChild(img);
            }
        }
    }

    function handlePlay() {
        if(isSpinning || curBal < curBet) return;
        
        isSpinning = true;
        curBal -= curBet;
        curWin = 0;
        updateUI();
        
        let spinCount = 0;
        const interval = setInterval(() => {
            init();
            spinCount++;
            if(spinCount > 12) {
                clearInterval(interval);
                finishSpin();
            }
        }, 80);
    }

    function finishSpin() {
        isSpinning = false;
        // Təsadüfi uduş simulyasiyası
        if(Math.random() < 0.3) {
            curWin = curBet * 5;
            curBal += curWin;
        }
        updateUI();
        if(auto) setTimeout(handlePlay, 1000);
    }

    function updateUI() {
        document.getElementById('bal-txt').innerText = (curBal * 100).toFixed(0);
        document.querySelector('#bal-txt + .azn-label').innerText = curBal.toFixed(2) + " Azn";
        document.getElementById('win-txt').innerText = (curWin * 100).toFixed(0);
        document.querySelector('#win-txt + .azn-label').innerText = curWin.toFixed(2) + " Azn";
    }

    function toggleAuto() {
        auto = !auto;
        document.getElementById('avto-btn').style.background = auto ? "var(--gold)" : "transparent";
        document.getElementById('avto-btn').style.color = auto ? "#000" : "var(--gold)";
        if(auto) handlePlay();
    }

    init();
</script>
</body>
</html>
