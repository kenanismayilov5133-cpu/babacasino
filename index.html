<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BABA KAZİNO | Multi-User</title>
    <script>
        // --- BURADAN YENİ KODLAR VƏ BALANSLAR ƏLAVƏ ET ---
        const MUSTERILER = {
            "145127": 10.00,  // 1-ci müştəri
            "223344": 50.00,   // 2-ci müştəri
            "998877": 30.00,  // 3-cü müştəri
            "554433": 20.00,   // 4-cü müştəri
            "admin7": 1000.00  // Özün üçün böyük balans
            // Bura istədiyin qədər (30-50 dənə) kod əlavə edə bilərsən
        };
        // ------------------------------------------------
    </script>
    <style>
        /* Sənin orijinal dizaynın eynilə saxlanıldı */
        :root { --gold: #d4af37; --red: #ff0000; --neon: #00f3ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background: #000; color: white; overflow: hidden; height: 100vh; }
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .code-screen { width: 280px; height: 50px; background: #111; border: 2px solid var(--gold); border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .numpad { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; }
        .num-btn { width: 70px; height: 70px; background: #222; border: 1px solid #444; border-radius: 10px; color: white; font-size: 24px; cursor: pointer; }
        #game-area { display: none; flex-direction: column; height: 100vh; position: relative; }
        .reels-container { flex: 1; display: flex; justify-content: center; align-items: center; gap: 5px; padding: 10px; background: #050505; position: relative; }
        .reel-col { width: 19%; height: 350px; background: rgba(20,20,20,0.95); border: 2px solid #333; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-around; align-items: center; position: relative; overflow: hidden; }
        .symbol { font-size: 50px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); transition: 0.1s; z-index: 2; }
        #win-lines { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none; }
        .win-path { stroke: #ffd700; stroke-width: 8; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 15px gold); }
        .dash { background: #111; display: grid; grid-template-columns: repeat(3, 1fr); padding: 15px; border-top: 2px solid #222; text-align: center; }
        .info-box span { display: block; font-size: 10px; color: #888; }
        .info-box strong { font-size: 18px; color: var(--gold); }
        .controls { background: #000; padding: 15px; display: flex; justify-content: space-around; align-items: center; gap: 10px; }
        .btn-main { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #fff; background: radial-gradient(#2ecc71, #1b5e20); color: white; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,0,0.4); }
        .btn-main.stop { background: radial-gradient(#e74c3c, #962d22); }
        .btn-main.take { background: radial-gradient(#f1c40f, #f39c12); color: #000; }
        .btn-auto { width: 60px; height: 60px; border-radius: 10px; background: #222; border: 2px solid #444; color: #fff; font-size: 10px; }
        .btn-auto.active { background: #00f3ff; color: #000; border-color: #fff; box-shadow: 0 0 15px #00f3ff; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 100% { transform: translate(1px, -2px) rotate(0deg); } }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="login-screen">
        <h1 style="color:var(--gold); margin-bottom:20px;">BABA KAZİNO</h1>
        <div class="code-screen" id="display">****</div>
        <div class="numpad" id="pad"></div>
    </div>

    <div id="game-area">
        <div class="reels-container" id="main-stage">
            <svg id="win-lines" viewBox="0 0 1000 350" preserveAspectRatio="none"></svg>
            <div class="reel-col" id="r1"></div>
            <div class="reel-col" id="r2"></div>
            <div class="reel-col" id="r3"></div>
            <div class="reel-col" id="r4"></div>
            <div class="reel-col" id="r5"></div>
        </div>

        <div class="dash">
            <div class="info-box"><span>BALANS</span><strong id="bal-text">0.00</strong></div>
            <div class="info-box"><span>UDUŞ</span><strong id="win-text">0.00</strong></div>
            <div class="info-box" onclick="manualBet()"><span>MƏRC</span><strong id="bet-text">1.00</strong></div>
        </div>

        <div class="controls">
            <button id="auto-btn" class="btn-auto" onclick="toggleAuto()">AUTO<br>OFF</button>
            <button id="main-btn" class="btn-main" onclick="handleAction()">START</button>
            <button class="num-btn" style="width:60px; height:60px; font-size:12px; background: #c0392b" onclick="location.reload()">ÇIXIŞ</button>
        </div>
    </div>

    <script>
        const symbols = ["🍎", "🍋", "🍒", "🍇", "7️⃣", "🍉", "⭐"];
        const s_spin = new Audio('https://freesound.org/data/previews/120/120373_824230-lq.mp3');
        const s_stop = new Audio('https://actions.google.com/sounds/v1/foley/button_click.ogg');
        const s_win = new Audio('https://freesound.org/data/previews/387/387232_1474204-lq.mp3');
        const s_take = new Audio('https://actions.google.com/sounds/v1/cartoon/clink_clank.ogg');

        let balance = 0;
        let bet = 1.00;
        let pendingWin = 0;
        let state = "IDLE";
        let activeUser = "";
        let timers = [];
        let autoMode = false;

        const padItems = ['1','2','3','4','5','6','7','8','9','C','0','OK'];
        padItems.forEach(v => {
            const b = document.createElement('button'); b.className = 'num-btn'; b.innerText = v;
            b.onclick = () => { 
                let d = document.getElementById('display');
                if(v==='C') d.innerText='****'; 
                else if(v==='OK') login(); 
                else { if(d.innerText=='****') d.innerText=v; else d.innerText+=v; } 
            };
            document.getElementById('pad').appendChild(b);
        });

        function login() { 
            let entered = document.getElementById('display').innerText;
            if(MUSTERILER[entered] !== undefined) {
                activeUser = entered;
                // Əgər əvvəl giribsə qalan balansı gətir, yoxsa yeni balans ver
                let saved = localStorage.getItem("baba_bal_" + activeUser);
                balance = saved ? parseFloat(saved) : MUSTERILER[activeUser];
                
                document.getElementById('login-screen').style.display='none'; 
                document.getElementById('game-area').style.display='flex'; 
                init();
            } else {
                alert("Kod yanlışdır!");
                document.getElementById('display').innerText = "****";
            }
        }

        function unlockAudio() { [s_spin, s_stop, s_win, s_take].forEach(s => { s.play(); s.pause(); }); }
        function init() { updateUI(); for(let i=1;i<=5;i++) fill(i); }
        function fill(id) { 
            let r=document.getElementById('r'+id); 
            let content = "";
            for(let j=0; j<3; j++) content += `<div class="symbol">${symbols[Math.floor(Math.random()*symbols.length)]}</div>`;
            r.innerHTML = content;
        }

        function handleAction() {
            if(state === "IDLE") {
                if(balance < bet) { autoMode = false; updateUI(); alert("Balans bitib!"); return; }
                startSpin();
            } else if(state === "SPINNING") forceStop();
            else if(state === "WINNING") takeMoney();
        }

        function startSpin() {
            state = "SPINNING";
            balance -= bet;
            save();
            pendingWin = 0;
            updateUI();
            document.getElementById('win-lines').style.display = 'none';
            document.getElementById('main-stage').classList.remove('shake');
            document.getElementById('main-btn').innerText = "STOP";
            document.getElementById('main-btn').className = "btn-main stop";
            s_spin.loop = true; s_spin.play();
            for(let i=1; i<=5; i++) {
                timers[i] = setInterval(() => fill(i), 70);
                timers[i+5] = setTimeout(() => stopReel(i), 800 + (i*300));
            }
        }

        function stopReel(id) {
            if(state !== "SPINNING") return;
            clearInterval(timers[id]);
            s_stop.play();
            if(id === 5) { s_spin.pause(); checkWin(); }
        }

        function forceStop() {
            for(let i=1; i<=10; i++) { clearInterval(timers[i]); clearTimeout(timers[i]); }
            for(let i=1; i<=5; i++) fill(i);
            s_spin.pause(); s_stop.play();
            checkWin();
        }

        function checkWin() {
            state = "IDLE";
            let btn = document.getElementById('main-btn');
            // Uduş şansı 30%
            if(Math.random() * 100 < 30) {
                state = "WINNING";
                pendingWin = bet * (Math.floor(Math.random()*10)+2);
                document.getElementById('win-lines').style.display = 'block';
                document.getElementById('win-lines').innerHTML = '<path class="win-path" d="M 0 175 L 1000 175" />';
                document.getElementById('main-stage').classList.add('shake');
                btn.innerText = "TAKE"; btn.className = "btn-main take";
                s_win.play();
                if(autoMode) setTimeout(takeMoney, 1000);
            } else {
                btn.innerText = "START"; btn.className = "btn-main";
                if(autoMode) setTimeout(handleAction, 500);
            }
            updateUI();
        }

        function takeMoney() {
            s_take.play();
            balance += pendingWin;
            save();
            pendingWin = 0;
            state = "IDLE";
            document.getElementById('win-lines').style.display = 'none';
            document.getElementById('main-stage').classList.remove('shake');
            document.getElementById('main-btn').innerText = "START";
            document.getElementById('main-btn').className = "btn-main";
            updateUI();
            if(autoMode) setTimeout(handleAction, 500);
        }

        function save() { localStorage.setItem("baba_bal_" + activeUser, balance); }
        function updateUI() { 
            document.getElementById('bal-text').innerText = balance.toFixed(2); 
            document.getElementById('win-text').innerText = pendingWin.toFixed(2);
            document.getElementById('bet-text').innerText = bet.toFixed(2);
        }
        function toggleAuto() {
            autoMode = !autoMode;
            document.getElementById('auto-btn').innerText = autoMode ? "AUTO\nON" : "AUTO\nOFF";
            document.getElementById('auto-btn').className = autoMode ? "btn-auto active" : "btn-auto";
            if(autoMode && state === "IDLE") handleAction();
        }
        function manualBet() {
            let b = prompt("Mərc:", bet);
            if(b && !isNaN(b)) { bet = parseFloat(b); updateUI(); }
        }
    </script>
</body>
</html>
