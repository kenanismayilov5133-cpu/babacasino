
<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BABA KAZİNO | Ultra Edition</title>
    <style>
        :root { --gold: #ffcc00; --neon-green: #39ff14; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background: #000; color: white; overflow: hidden; height: 100vh; }
        
        /* Giriş Ekranı */
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .code-screen { width: 260px; height: 50px; background: #111; border: 2px solid var(--gold); border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .numpad { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; }
        .num-btn { width: 70px; height: 70px; background: #222; border: 1px solid #444; border-radius: 10px; color: white; font-size: 24px; cursor: pointer; }

        /* Oyun Sahəsi */
        #game-area { display: none; flex-direction: column; height: 100vh; }
        .reels-container { flex: 1; display: flex; justify-content: center; align-items: center; gap: 8px; padding: 10px; background: #050505; position: relative; }
        .reel-col { width: 18%; height: 360px; background: #111; border: 1px solid #333; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .symbol { width: 100%; height: 120px; display: flex; align-items: center; justify-content: center; }
        .symbol img { width: 80px; height: 80px; object-fit: contain; }

        /* Uduş Xətləri (Ziqzaq) */
        .line-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        .dash { background: #0a0a0a; display: grid; grid-template-columns: repeat(3, 1fr); padding: 15px; border-top: 2px solid var(--gold); }
        .info-box { text-align: center; }
        .info-box span { display: block; font-size: 10px; color: #888; }
        .info-box strong { font-size: 18px; color: var(--gold); }

        .controls { background: #000; padding: 15px; display: flex; justify-content: space-around; align-items: center; }
        .btn-main { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #fff; font-weight: bold; cursor: pointer; }
        .btn-main.start { background: radial-gradient(#2ecc71, #1b5e20); color: white; }
        .btn-main.stop { background: radial-gradient(#e74c3c, #962d22); color: white; }
        .btn-main.take { background: radial-gradient(#f1c40f, #f39c12); color: black; box-shadow: 0 0 20px var(--gold); }
        .btn-auto { width: 60px; height: 60px; border-radius: 10px; background: #222; color: #fff; font-size: 10px; border: 1px solid #444; }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="login-screen">
        <h2 style="color:var(--gold); margin-bottom:15px;">BABA KAZİNO</h2>
        <div class="code-screen" id="display">****</div>
        <div class="numpad" id="pad"></div>
    </div>

    <div id="game-area">
        <div class="reels-container">
            <svg class="line-overlay" id="win-lines"></svg>
            <div class="reel-col" id="r1"></div>
            <div class="reel-col" id="r2"></div>
            <div class="reel-col" id="r3"></div>
            <div class="reel-col" id="r4"></div>
            <div class="reel-col" id="r5"></div>
        </div>

        <div class="dash">
            <div class="info-box"><span>BALANS (AZN)</span><strong id="bal-text">0.00</strong></div>
            <div class="info-box"><span>SON UDUŞ</span><strong id="win-text">0.00</strong></div>
            <div class="info-box"><span>MƏRC</span><strong id="bet-text">1.00</strong></div>
        </div>

        <div class="controls">
            <button id="auto-btn" class="btn-auto" onclick="toggleAuto()">AUTO<br>OFF</button>
            <button id="main-btn" class="btn-main start" onclick="handleAction()">START</button>
            <button class="num-btn" style="width:60px; height:60px; font-size:10px; background:#c0392b" onclick="tamCixis()">ÇIXIŞ</button>
        </div>
    </div>

    <script>
        const MUSTERILER = { "145127": 10.0, "777": 1000.0, "223344": 50.0 };
        const symbols = [
            {id: 'apple', img: 'https://img.icons8.com/emoji/96/apple-emoji.png'},
            {id: 'lemon', img: 'https://img.icons8.com/emoji/96/lemon-emoji.png'},
            {id: 'grape', img: 'https://img.icons8.com/emoji/96/grapes-emoji.png'},
            {id: 'melon', img: 'https://img.icons8.com/emoji/96/watermelon-emoji.png'},
            {id: 'star',  img: 'https://img.icons8.com/color/96/star--v1.png'},
            {id: 'seven', img: 'https://img.icons8.com/color/96/7-ball.png'}
        ];

        // Uduş xətləri (0=üst, 1=orta, 2=alt)
        const paylines = [
            [1, 1, 1, 1, 1], // Orta düz
            [0, 0, 0, 0, 0], // Üst düz
            [2, 2, 2, 2, 2], // Alt düz
            [0, 1, 2, 1, 0], // Ziqzaq (V)
            [2, 1, 0, 1, 2]  // Tərs Ziqzaq
        ];

        let balance = 0, bet = 1.00, pendingWin = 0, state = "IDLE", autoMode = false;
        let activeUserCode = localStorage.getItem("active_baba_user") || "";
        let reelData = [[],[],[],[],[]]; // Ekrandakı meyvələrin datası

        // --- Giriş Məntiqi ---
        const padItems = ['1','2','3','4','5','6','7','8','9','C','0','OK'];
        padItems.forEach(v => {
            let b = document.createElement('button'); b.className = 'num-btn'; b.innerText = v;
            b.onclick = () => {
                let d = document.getElementById('display');
                if(v==='C') d.innerText='****';
                else if(v==='OK') login();
                else { if(d.innerText=='****') d.innerText=v; else d.innerText+=v; }
            };
            document.getElementById('pad').appendChild(b);
        });

        function login() {
            let code = document.getElementById('display').innerText;
            if(MUSTERILER[code]) {
                activeUserCode = code;
                localStorage.setItem("active_baba_user", code);
                balance = parseFloat(localStorage.getItem("baba_bal_"+code)) || MUSTERILER[code];
                startApp();
            } else { alert("Kod yanlış!"); document.getElementById('display').innerText='****'; }
        }

        if(activeUserCode && MUSTERILER[activeUserCode]) startApp();

        function startApp() {
            document.getElementById('login-screen').style.display='none';
            document.getElementById('game-area').style.display='flex';
            updateUI();
            for(let i=1; i<=5; i++) fillReel(i);
        }

        function fillReel(id) {
            let r = document.getElementById('r'+id);
            let content = "";
            reelData[id-1] = [];
            for(let j=0; j<3; j++) {
                let s = symbols[Math.floor(Math.random()*symbols.length)];
                reelData[id-1].push(s.id);
                content += `<div class="symbol"><img src="${s.img}"></div>`;
            }
            r.innerHTML = content;
        }

        function handleAction() {
            if(state === "IDLE") {
                if(balance < bet) return alert("Balans azdır!");
                clearLines();
                state = "SPINNING";
                balance -= bet;
                updateUI();
                document.getElementById('main-btn').className = "btn-main stop";
                document.getElementById('main-btn').innerText = "STOP";
                startSpinning();
            } else if(state === "SPINNING") {
                stopSpinning();
            } else if(state === "WINNING") {
                takeWin();
            }
        }

        let spinIntervals = [];
        function startSpinning() {
            for(let i=1; i<=5; i++) {
                spinIntervals[i] = setInterval(() => fillReel(i), 80);
            }
            // Avtomatik dayanma (sıra ilə)
            for(let i=1; i<=5; i++) {
                setTimeout(() => { if(spinIntervals[i]) stopReel(i); }, 1000 + (i*300));
            }
        }

        function stopReel(i) {
            clearInterval(spinIntervals[i]);
            spinIntervals[i] = null;
            if(i === 5) checkResults();
        }

        function stopSpinning() {
            for(let i=1; i<=5; i++) stopReel(i);
        }

        function checkResults() {
            let totalWin = 0;
            let linesWon = [];

            paylines.forEach((line, lineIdx) => {
                let firstSym = reelData[0][line[0]];
                let count = 1;

                for(let col=1; col<5; col++) {
                    if(reelData[col][line[col]] === firstSym) count++;
                    else break;
                }

                if(count >= 3) {
                    let winMult = 0;
                    if(firstSym === 'seven') winMult = 100; // 3+ dənə 7 gəlsə x100
                    else if(firstSym === 'star' && count === 3) winMult = 2; // 3 dənə ulduz x2
                    else winMult = count * 2; // Qalan meyvələr (3 dənə x6, 4 dənə x8 və s.)

                    totalWin += (bet * winMult);
                    linesWon.push(line);
                }
            });

            if(totalWin > 0) {
                pendingWin = totalWin;
                state = "WINNING";
                document.getElementById('main-btn').className = "btn-main take";
                document.getElementById('main-btn').innerText = "TAKE";
                drawWinLines(linesWon);
            } else {
                state = "IDLE";
                document.getElementById('main-btn').className = "btn-main start";
                document.getElementById('main-btn').innerText = "START";
                if(autoMode) setTimeout(handleAction, 1000);
            }
            updateUI();
        }

        function drawWinLines(lines) {
            const svg = document.getElementById('win-lines');
            lines.forEach(line => {
                let path = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
                let points = "";
                line.forEach((row, col) => {
                    let x = (col * 20) + 10; // Faizlə hesablama
                    let y = (row * 33) + 16;
                    points += `${x}%,${y}% `;
                });
                path.setAttribute("points", points);
                path.setAttribute("stroke", "yellow");
                path.setAttribute("stroke-width", "4");
                path.setAttribute("fill", "none");
                svg.appendChild(path);
            });
        }

        function clearLines() { document.getElementById('win-lines').innerHTML = ""; }

        function takeWin() {
            balance += pendingWin;
            pendingWin = 0;
            state = "IDLE";
            save();
            updateUI();
            clearLines();
            document.getElementById('main-btn').className = "btn-main start";
            document.getElementById('main-btn').innerText = "START";
            if(autoMode) setTimeout(handleAction, 800);
        }

        function updateUI() {
            document.getElementById('bal-text').innerText = balance.toFixed(2);
            document.getElementById('win-text').innerText = pendingWin.toFixed(2);
            document.getElementById('bet-text').innerText = bet.toFixed(2);
        }

        function save() { localStorage.setItem("baba_bal_"+activeUserCode, balance); }
        function toggleAuto() {
            autoMode = !autoMode;
            document.getElementById('auto-btn').style.background = autoMode ? "var(--neon-green)" : "#222";
            if(autoMode && state === "IDLE") handleAction();
        }
        function tamCixis() { localStorage.removeItem("active_baba_user"); location.reload(); }
        function unlockAudio() {} // Səs funksiyası ehtiyac olsa bura yazılır
    </script>
</body>
</html>
