<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>BABA KAZİNO | MAX WIN</title>
    <style>
        :root { 
            --gold: #ffcc00; 
            --neon: #39ff14; 
            --red: #ff4444; 
            --purple: #8a2be2;
            --blue: #00bfff;
            --bg-grad: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; touch-action: manipulation; }
        body { background: #000; color: white; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }

        /* GİRİŞ SİSTEMİ */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .keypad-container { width: 320px; background: #111; border: 4px solid var(--purple); border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 0 30px rgba(138, 43, 226, 0.4); }
        .access-screen { background: #001a00; border: 2px solid var(--neon); height: 50px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--neon); letter-spacing: 5px; border-radius: 5px; box-shadow: inset 0 0 10px var(--neon); }
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key-btn { background: #222; border: 1px solid #444; border-radius: 8px; height: 60px; color: white; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .key-btn:active { background: var(--purple); transform: scale(0.9); }

        /* ADMİN PANEL */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 1000; overflow-y: auto; padding: 20px; }
        .admin-box { max-width: 600px; margin: 0 auto; background: #151515; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: var(--gold); }
        .user-item { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; border-left: 4px solid var(--gold); }

        /* OYUN SAHƏSİ */
        #game-container { display: none; width: 100%; max-width: 950px; background: rgba(20, 20, 30, 0.95); padding: 15px; border: 3px solid #444; border-radius: 15px; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .reels-wrapper { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 20px; padding: 10px; background: #000; border-radius: 10px; position: relative; border: 2px solid var(--blue); background-image: var(--bg-grad); box-shadow: inset 0 0 20px rgba(0, 191, 255, 0.2); }
        .reel-col { width: 19%; height: 380px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .symbol { width: 100%; height: 126px; display: flex; align-items: center; justify-content: center; }
        .symbol img { width: 95px; height: 95px; object-fit: contain; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        .win-line-overlay { position: absolute; height: 8px; background: #fff; box-shadow: 0 0 20px #fff, 0 0 40px var(--blue); z-index: 100; border-radius: 4px; pointer-events: none; display: none; }
        .dash { display: flex; justify-content: space-around; background: #111; border: 2px solid var(--purple); padding: 12px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 0 15px rgba(138, 43, 226, 0.3); }
        .info-item { text-align: center; }
        .info-item span { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .info-item strong { display: block; font-size: 20px; color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .control-panel { display: flex; justify-content: space-between; align-items: center; gap: 5px; }
        .btn-rect { background: #333; border: 2px solid #555; color: white; padding: 10px 5px; border-radius: 8px; cursor: pointer; font-weight: bold; min-width: 75px; text-align: center; font-size: 12px; transition: 0.2s; }
        .main-btn { width: 110px; height: 110px; border-radius: 50%; border: 8px solid #1b5e20; background: radial-gradient(circle, #fff, #ccc); color: #000; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.2s; }
        .main-btn.stop { border-color: #b71c1c; background: #ff5252; color: #fff; }
        .main-btn.take { border-color: #fbc02d; background: var(--gold); color: #000; animation: glowPulse 0.8s infinite; }
        @keyframes glowPulse { 0% { box-shadow: 0 0 5px var(--gold); } 50% { box-shadow: 0 0 30px var(--gold); } 100% { box-shadow: 0 0 5px var(--gold); } }
        .win-glow { filter: brightness(1.5) drop-shadow(0 0 20px #fff) !important; transform: scale(1.15); transition: 0.3s; }
        .star-glow { filter: brightness(1.7) drop-shadow(0 0 25px var(--gold)) !important; animation: starPulse 0.5s infinite alternate; }
        @keyframes starPulse { from { transform: scale(1.1); } to { transform: scale(1.25); } }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="keypad-container">
            <div class="access-screen" id="code-display">****</div>
            <div class="keypad-grid" id="keys"></div>
        </div>
    </div>
    <div id="admin-panel">
        <div class="admin-box">
            <div class="admin-header"><h2>BABA PANEL VIP</h2><button class="admin-btn btn-delete" onclick="location.reload()">BAĞLA</button></div>
            <div id="user-list">Yüklənir...</div>
        </div>
    </div>

    <div id="game-container">
        <div class="reels-wrapper" id="reels-area">
            <div id="line-0" class="win-line-overlay"></div><div id="line-1" class="win-line-overlay"></div><div id="line-2" class="win-line-overlay"></div>
            <div class="reel-col" id="r1"></div><div class="reel-col" id="r2"></div><div class="reel-col" id="r3"></div><div class="reel-col" id="r4"></div><div class="reel-col" id="r5"></div>
        </div>
        <div class="dash">
            <div class="info-item"><span>BALANS</span><strong id="bal-val">0.00</strong></div>
            <div class="info-item"><span>UDUŞ</span><strong id="win-val" style="color:var(--neon)">0.00</strong></div>
            <div class="info-item"><span>CƏMİ MƏRC</span><strong id="bet-total">0.20</strong></div>
        </div>
        <div class="control-panel">
            <button class="btn-rect">RİSK</button><button class="btn-rect" onclick="toggleAuto()" id="auto-btn">AVTO</button>
            <button class="main-btn" id="main-btn" onclick="handleAction()">START</button>
            <button class="btn-rect" onclick="changeLines()">XƏTT<br><b id="line-val">20</b></button>
            <button class="btn-rect" onclick="changeBet()">MƏRC<br><b id="bet-val">0.01</b></button>
        </div>
    </div>

    <script>
        const DB_URL = "https://babacasino-9fca0-default-rtdb.firebaseio.com/users";
        let currentUser = null, balans = 0, winPerc = 25, inputCode = "", gameState = "START", autoMode = false;
        let activeLine = 20, betIndex = 0, currentWin = 0;
        const betList = [0.01, 0.10, 0.30, 0.50, 0.70, 1.00, 2.00, 5.00, 10.00, 20.00, 50.00, 100.00, 200.00];
        const items = ["7.png.jpeg", "gavali.png.jpeg", "limon.png.jpeg", "portagal.png.jpeg", "qarpiz.png.jpeg", "ulduz.png.jpeg", "uzum.png.jpeg"];
        const baseUrl = "https://raw.githubusercontent.com/kenanismayilov5133-cpu/babacasino/main/simvollar/";
        let intervals = [null, null, null, null, null], stopTimeouts = [];
        let totalSpins = 0; let nextStarSpin = Math.floor(Math.random() * 5) + 15;

        // Klaviatura
        const keyArea = document.getElementById('keys');
        [1,2,3,4,5,6,7,8,9,'C',0,'OK'].forEach(k => {
            let b = document.createElement('button'); b.className = 'key-btn'; b.innerText = k;
            b.onclick = () => {
                if(k === 'C') inputCode = ""; else if(k === 'OK') checkLogin(); else if(inputCode.length < 4) inputCode += k;
                document.getElementById('code-display').innerText = "*".repeat(inputCode.length) || "****";
            };
            keyArea.appendChild(b);
        });

        async function checkLogin() {
            if(inputCode === "0071") { openAdmin(); return; }
            try {
                let res = await fetch(`${DB_URL}/${inputCode}.json`);
                let data = await res.json();
                if(data) {
                    currentUser = inputCode; balans = data.bal; winPerc = data.perc || 25;
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('game-container').style.display = 'block';
                    updateUI(); fillReels();
                } else { alert("KOD SƏHVDİR!"); inputCode = ""; }
            } catch(e) { alert("Xəta!"); }
        }

        function openAdmin() { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('admin-panel').style.display = 'block'; loadUsers(); }
        async function loadUsers() {
            let res = await fetch(`${DB_URL}.json`); let users = await res.json(); let html = "";
            for(let id in users) { html += `<div class="user-item"><strong>KOD: ${id}</strong> | Bal: ${users[id].bal} <button class="admin-btn btn-save" onclick="location.reload()">OK</button></div>`; }
            document.getElementById('user-list').innerHTML = html;
        }

        function changeLines() { activeLine = activeLine >= 20 ? 1 : activeLine + 1; document.getElementById('line-val').innerText = activeLine; updateUI(); }
        function changeBet() { betIndex = (betIndex + 1) % betList.length; document.getElementById('bet-val').innerText = betList[betIndex].toFixed(2); updateUI(); }
        function updateUI(w=0) {
            document.getElementById('bal-val').innerText = balans.toFixed(2);
            document.getElementById('win-val').innerText = w.toFixed(2);
            document.getElementById('bet-total').innerText = (activeLine * betList[betIndex]).toFixed(2);
            if(currentUser) fetch(`${DB_URL}/${currentUser}/bal.json`, { method: 'PUT', body: balans });
        }

        function fillReels(specificReel = null) {
            const start = specificReel ? specificReel : 1;
            const end = specificReel ? specificReel : 5;
            let currentStars = document.querySelectorAll('.symbol[data-sym="ulduz.png.jpeg"]').length;
            let canShowStar = (totalSpins >= nextStarSpin);
            for(let i=start; i<=end; i++) {
                let r = document.getElementById('r'+i); r.innerHTML = "";
                for(let j=0; j<3; j++) {
                    let img = items[Math.floor(Math.random()*items.length)];
                    if(canShowStar && currentStars < 3 && Math.random() < 0.1) { img = "ulduz.png.jpeg"; currentStars++; }
                    else if(img === "ulduz.png.jpeg") { img = "7.png.jpeg"; }
                    r.innerHTML += `<div class="symbol" id="s-${i-1}-${j}" data-sym="${img}"><img src="${baseUrl+img}"></div>`;
                }
            }
        }

        function handleAction() {
            let totalBet = activeLine * betList[betIndex];
            if(gameState === "START") {
                if(balans < totalBet) return alert("Balans azdır!");
                balans -= totalBet; updateUI(); clearWinEffects(); gameState = "SPIN"; totalSpins++;
                document.getElementById('main-btn').innerText = "STOP"; document.getElementById('main-btn').classList.add('stop');
                for(let i=1; i<=5; i++) intervals[i-1] = setInterval(() => fillReels(i), 70);
                for(let i=1; i<=5; i++) stopTimeouts.push(setTimeout(() => { clearInterval(intervals[i-1]); if(i===5) checkPayout(); }, 600+(i*400)));
            } else if(gameState === "SPIN") {
                stopTimeouts.forEach(clearTimeout); intervals.forEach(clearInterval);
                for(let i=1; i<=5; i++) fillReels(i); checkPayout();
            } else if(gameState === "TAKE") {
                balans += currentWin; currentWin = 0; updateUI(); gameState = "START";
                document.getElementById('main-btn').innerText = "START"; document.getElementById('main-btn').classList.remove('take');
                clearWinEffects(); if(autoMode) setTimeout(handleAction, 500);
            }
        }

        function checkPayout() {
            let totalWin = 0; let winDetails = []; let singleBet = betList[betIndex];
            let starCount = 0;
            document.querySelectorAll('.symbol').forEach(s => { if(s.dataset.sym === "ulduz.png.jpeg") starCount++; });
            
            // STAR UDUŞU (Cəmi mərcin 5 qatı)
            if(starCount >= 3) {
                totalWin += (activeLine * singleBet) * 5; totalSpins = 0;
                document.querySelectorAll('.symbol').forEach(s => { if(s.dataset.sym === "ulduz.png.jpeg") s.querySelector('img').classList.add('star-glow'); });
            }

            for (let row = 0; row < 3; row++) {
                let first = document.getElementById(`s-0-${row}`).dataset.sym;
                if(first === "ulduz.png.jpeg") continue;
                let matches = 1;
                for (let col = 1; col < 5; col++) {
                    if (document.getElementById(`s-${col}-${row}`).dataset.sym === first) matches++; else break;
                }

                if (matches >= 3) {
                    let mult = 0;
                    // HƏR MEYVƏYƏ AYRI VƏ SANBALLI UDUŞLAR
                    if(first === "7.png.jpeg") {
                        mult = (matches === 3 ? 100 : (matches === 4 ? 500 : 2500)); // 7-LƏR (5 dənə = 2500x)
                    } else if(first === "qarpiz.png.jpeg") {
                        mult = (matches === 3 ? 40 : (matches === 4 ? 150 : 800)); // Qarpız
                    } else if(first === "uzum.png.jpeg") {
                        mult = (matches === 3 ? 30 : (matches === 4 ? 100 : 500)); // Üzüm
                    } else if(first === "gavali.png.jpeg") {
                        mult = (matches === 3 ? 20 : (matches === 4 ? 60 : 300)); // Gavalı
                    } else if(first === "portagal.png.jpeg" || first === "limon.png.jpeg") {
                        mult = (matches === 3 ? 10 : (matches === 4 ? 40 : 200)); // Portağal və Limon
                    }

                    totalWin += singleBet * mult;
                    winDetails.push({row, matches});
                }
            }

            if (totalWin > 0) {
                currentWin = totalWin; updateUI(currentWin); gameState = "TAKE";
                let b = document.getElementById('main-btn'); b.innerText = "TAKE"; b.classList.remove('stop'); b.classList.add('take');
                applyVisuals(winDetails);
            } else {
                gameState = "START"; document.getElementById('main-btn').innerText = "START";
                document.getElementById('main-btn').classList.remove('stop'); if(autoMode) setTimeout(handleAction, 800);
            }
        }

        function applyVisuals(details) {
            details.forEach(w => {
                let l = document.getElementById(`line-${w.row}`); l.style.display = 'block'; 
                l.style.top = (63+(w.row*126))+'px'; l.style.width = (w.matches*19)+'%';
                for(let c=0; c<w.matches; c++) document.querySelector(`#s-${c}-${w.row} img`).classList.add('win-glow');
            });
        }
        function clearWinEffects() { document.querySelectorAll('.win-line-overlay').forEach(l => l.style.display='none'); document.querySelectorAll('.symbol img').forEach(i => i.classList.remove('win-glow', 'star-glow')); }
        function toggleAuto() { autoMode = !autoMode; document.getElementById('auto-btn').style.background = autoMode ? 'var(--neon)' : '#333'; if(autoMode && gameState === "START") handleAction(); }
    </script>
</body>
</html>
