<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BABA KAZİNO | Official Edition</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Sənin Firebase Məlumatların
        const firebaseConfig = {
            apiKey: "AIzaSyCIEUZQm-Vntf7gDSN_je6PEmnbdTIRNnw",
            authDomain: "babacasino-bd0cc.firebaseapp.com",
            projectId: "babacasino-bd0cc",
            storageBucket: "babacasino-bd0cc.firebasestorage.app",
            messagingSenderId: "166709591988",
            appId: "1:166709591988:web:5c4004ed8a3e557a1d3ce1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- MÜŞTƏRİ SİYAHISI (Buranı GitHub-da redaktə edə bilərsən) ---
        // Format: "KOD": [BALANS, UDUŞ_FAİZİ]
        const LOKAL_MUSTERILER = {
            "145127": [100.00, 30], // %30 uduş şansı
            "7777": [500.00, 70],   // %70 uduş şansı (Çox udacaq)
            "admin": [1000.00, 90]  // %90 uduş şansı
        };

        // Oyunun qalan hissəsi üçün dəyişənlər
        window.db = db;
        window.LOKAL_MUSTERILER = LOKAL_MUSTERILER;
    </script>

    <style>
        :root { --gold: #ffd700; --fire: #ff4500; }
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: sans-serif; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .code-display { width: 260px; height: 60px; background: #111; border: 3px solid var(--gold); border-radius: 12px; font-size: 32px; color: var(--gold); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .numpad { display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; }
        .n-btn { width: 80px; height: 80px; background: #222; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 24px; }
        
        #game-area { display: none; height: 100vh; flex-direction: column; background: radial-gradient(circle, #220000 0%, #000 100%); }
        .reels { flex: 1; display: flex; justify-content: center; align-items: center; gap: 5px; padding: 5px; }
        .reel { width: 19%; height: 80%; background: rgba(0,0,0,0.8); border: 2px solid #333; border-radius: 5px; display: flex; flex-direction: column; justify-content: space-around; align-items: center; overflow: hidden; }
        .sym { font-size: 45px; transition: 0.1s; filter: drop-shadow(0 0 10px rgba(255,69,0,0.5)); }
        
        .panel { background: #111; padding: 10px; display: grid; grid-template-columns: repeat(3, 1fr); border-top: 2px solid #333; }
        .stat { text-align: center; }
        .stat span { font-size: 10px; color: #aaa; display: block; }
        .stat b { font-size: 20px; color: var(--gold); }
        
        .controls { padding: 15px; display: flex; justify-content: space-around; align-items: center; }
        .btn-start { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(#2ecc71, #1b5e20); border: 4px solid #fff; color: #fff; font-weight: bold; font-size: 18px; box-shadow: 0 0 20px #2ecc71; }
        .btn-avto { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); background: #000; color: var(--gold); font-size: 12px; }
        .btn-exit { background: #c0392b; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color:var(--gold)">BABA KAZİNO</h1>
    <div class="code-display" id="code-val">****</div>
    <div class="numpad" id="numpad"></div>
</div>

<div id="game-area">
    <div class="reels">
        <div class="reel" id="r1"></div>
        <div class="reel" id="r2"></div>
        <div class="reel" id="r3"></div>
        <div class="reel" id="r4"></div>
        <div class="reel" id="r5"></div>
    </div>
    <div class="panel">
        <div class="stat"><span>KREDİT</span><b id="bal-txt">0.00</b></div>
        <div class="stat"><span>UDULUB</span><b id="win-txt">0.00</b></div>
        <div class="stat"><span>BAHİS</span><b id="bet-txt">1.00</b></div>
    </div>
    <div class="controls">
        <button class="btn-avto" onclick="toggleAuto()">AVTO</button>
        <button class="btn-start" id="main-btn" onclick="handlePlay()">START</button>
        <button class="btn-exit" onclick="cixis()">ÇIXIŞ</button>
    </div>
</div>

<script>
    const symbols = ["🔥🍇", "⭐", "🍉", "🍋", "7️⃣", "🍒", "🍇"];
    let curBal = 0;
    let curWin = 0;
    let curBet = 1.00;
    let activeUser = null;
    let isSpinning = false;
    let auto = false;

    // Numpad yaratma
    const pad = document.getElementById('numpad');
    ['1','2','3','4','5','6','7','8','9','C','0','OK'].forEach(v => {
        let b = document.createElement('button'); b.className = 'n-btn'; b.innerText = v;
        b.onclick = () => {
            let d = document.getElementById('code-val');
            if(v==='C') d.innerText = '****';
            else if(v==='OK') giris(d.innerText);
            else { if(d.innerText==='****') d.innerText = v; else d.innerText += v; }
        };
        pad.appendChild(b);
    });

    function giris(kod) {
        if(window.LOKAL_MUSTERILER[kod]) {
            activeUser = kod;
            curBal = window.LOKAL_MUSTERILER[kod][0];
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            updateUI();
            fillAll();
        } else { alert("Yanlış kod!"); document.getElementById('code-val').innerText = '****'; }
    }

    function fillAll() { for(let i=1;i<=5;i++) fillReel(i); }
    function fillReel(id) {
        let r = document.getElementById('r'+id);
        r.innerHTML = '';
        for(let j=0;j<3;j++) {
            let s = document.createElement('div'); s.className = 'sym';
            s.innerText = symbols[Math.floor(Math.random()*symbols.length)];
            r.appendChild(s);
        }
    }

    function handlePlay() {
        if(isSpinning) return;
        if(curBal < curBet) { alert("Balans azdır!"); return; }
        
        isSpinning = true;
        curBal -= curBet;
        curWin = 0;
        updateUI();
        
        let count = 0;
        let iv = setInterval(() => { fillAll(); count++; if(count > 15) stop(iv); }, 50);
    }

    function stop(iv) {
        clearInterval(iv);
        isSpinning = false;
        
        // Uduş şansını yoxla
        let sans = window.LOKAL_MUSTERILER[activeUser][1];
        if(Math.random()*100 < sans) {
            curWin = curBet * (Math.floor(Math.random()*10)+2);
            curBal += curWin;
            document.getElementById('main-btn').style.boxShadow = "0 0 40px gold";
        } else {
            document.getElementById('main-btn').style.boxShadow = "none";
        }
        updateUI();
        if(auto) setTimeout(handlePlay, 1000);
    }

    function updateUI() {
        document.getElementById('bal-txt').innerText = curBal.toFixed(2);
        document.getElementById('win-txt').innerText = curWin.toFixed(2);
    }

    function cixis() {
        if(confirm("Çıxmaq istəyirsən?")) location.reload();
    }
    
    function toggleAuto() { auto = !auto; document.querySelector('.btn-avto').style.background = auto ? "var(--gold)" : "#000"; if(auto) handlePlay(); }
</script>
</body>
</html>
