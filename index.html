<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABA KAZİNO | 4 rəqəmli</title>
    <style>
        :root { --gold: #ffd700; --dark: #111; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .keypad { background: #222; padding: 20px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; }
        .screen { background: #000; color: var(--gold); font-size: 35px; height: 60px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border-radius: 8px; border: 1px solid #444; min-width: 180px; letter-spacing: 10px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { background: #333; color: white; border: none; padding: 20px; font-size: 22px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn:active { background: var(--gold); color: black; }

        #game-container { display: none; text-align: center; width: 100%; }
        .balans-area { background: #222; padding: 10px; border-bottom: 2px solid var(--gold); font-size: 22px; color: var(--gold); margin-bottom: 20px; }
        .slot-box { font-size: 45px; background: #000; padding: 30px; border: 3px solid var(--gold); border-radius: 15px; margin: 20px auto; width: fit-content; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .main-btn { background: var(--gold); color: black; padding: 18px 50px; font-size: 24px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; text-transform: uppercase; }
        .main-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 style="color:var(--gold); letter-spacing: 2px;">GİRİŞ KODU</h2>
        <div class="keypad">
            <div id="display" class="screen">----</div>
            <div class="grid">
                <button class="btn" onclick="tap(1)">1</button>
                <button class="btn" onclick="tap(2)">2</button>
                <button class="btn" onclick="tap(3)">3</button>
                <button class="btn" onclick="tap(4)">4</button>
                <button class="btn" onclick="tap(5)">5</button>
                <button class="btn" onclick="tap(6)">6</button>
                <button class="btn" onclick="tap(7)">7</button>
                <button class="btn" onclick="tap(8)">8</button>
                <button class="btn" onclick="tap(9)">9</button>
                <button class="btn" style="background:#800" onclick="clr()">C</button>
                <button class="btn" onclick="tap(0)">0</button>
                <button class="btn" style="background:#080" onclick="go()">OK</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div class="balans-area">BALANS: <span id="bal-text">0.00</span> AZN</div>
        <div class="slot-box" id="slot-res">🎰 🎰 🎰</div>
        <p id="msg" style="color: #aaa; font-style: italic;">Mərc: 1.00 AZN</p>
        <button class="main-btn" onclick="spin()">SPIN</button>
    </div>

    <script>
        // HƏM BALANS, HƏM UDUŞ FAİZİ (WinPercent)
        const users = {
            "1765": { bal: 50.00, winPercent: 30 }, // 30% şans
            "6547": { bal: 10.00, winPercent: 15 }, // 15% şans
            "9643": { bal: 15.00, winPercent: 20 }, // 20% şans
            "1587": { bal: 25.00, winPercent: 80 }  // TEST ÜÇÜN: 80% şans (həmişə udur)
        };

        let currentCode = "";
        let balance = 0;
        let myWinChance = 0;

        function tap(n) {
            if(currentCode.length < 4) {
                currentCode += n;
                updateDisplay();
            }
        }

        function updateDisplay() {
            let res = "";
            for(let i=0; i<4; i++) {
                res += (i < currentCode.length) ? "*" : "-";
            }
            document.getElementById('display').innerText = res;
        }

        function clr() {
            currentCode = "";
            updateDisplay();
        }

        function go() {
            if(users[currentCode]) {
                // LocalStorage-dan yoxla
                let saved = localStorage.getItem('bal_v4_' + currentCode);
                balance = saved ? parseFloat(saved) : users[currentCode].bal;
                myWinChance = users[currentCode].winPercent; // Şansı bazadan götürürük
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                refreshUI();
            } else {
                alert("KOD SƏHVDİR!");
                clr();
            }
        }

        function refreshUI() {
            document.getElementById('bal-text').innerText = balance.toFixed(2);
            localStorage.setItem('bal_v4_' + currentCode, balance);
        }

        function spin() {
            if(balance < 1) { alert("BALANS BİTDİ!"); return; }
            balance -= 1;
            refreshUI();
            
            document.getElementById('slot-res').innerText = "⏳ ⏳ ⏳";
            
            setTimeout(() => {
                // UDUŞ FAİZİ BURADA İŞLƏYİR
                let randomVal = Math.random() * 100;
                if(randomVal < myWinChance) {
                    let winAmt = 5; // Məsələn, 5 qat uduş
                    balance += winAmt;
                    document.getElementById('slot-res').innerText = "💰 💎 💰";
                    document.getElementById('msg').innerText = "TƏBRİKLƏR! +5.00 AZN";
                } else {
                    document.getElementById('slot-res').innerText = "🍋 🍒 🔔";
                    document.getElementById('msg').innerText = "TƏZADƏN YOXLA!";
                }
                refreshUI();
            }, 700);
        }
        
        updateDisplay();
    </script>
</body>
</html>
